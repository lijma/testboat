site_name: ftest
site_url: https://lijma.github.io/ftest/
site_description: Manage tests like code — CLI + AI agent skill for the complete testing lifecycle.
site_author: Marvin Li
repo_url: https://github.com/lijma/ftest
repo_name: lijma/ftest

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lijma/ftest
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/ftest/

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Commands: commands.md
